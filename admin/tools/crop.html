<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Crop Tool — Florez Florez</title>
  <link rel="stylesheet" href="https://unpkg.com/cropperjs@1.6.2/dist/cropper.min.css">
  <style>
    @font-face {
      font-family: 'IBM Plex Mono';
      src: url('/fonts/IBMPlexMono-SemiBold.ttf') format('truetype');
      font-weight: 600;
      font-style: normal;
    }
    @font-face {
      font-family: 'IBM Plex Mono';
      src: url('/fonts/IBMPlexMono-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'IBM Plex Mono', monospace;
      background: #fff;
      color: #333;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.1);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .toolbar h1 {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.35);
      margin-right: auto;
    }

    .toolbar a {
      color: rgba(0,0,0,0.35);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.2s;
    }
    .toolbar a:hover { color: #333; }

    label.file-label {
      display: inline-block;
      padding: 0.5rem 1.5rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #fff;
      background: #333;
      cursor: pointer;
      transition: background 0.2s;
    }
    label.file-label:hover { background: #555; }
    input[type="file"] { display: none; }

    .name-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .name-group label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.35);
    }

    .name-input {
      background: transparent;
      border: 1px solid rgba(0,0,0,0.15);
      color: #333;
      padding: 0.5rem 0.75rem;
      font-family: inherit;
      font-size: 0.85rem;
      width: 200px;
    }
    .name-input:focus {
      outline: none;
      border-color: rgba(0,0,0,0.4);
    }
    .name-input::placeholder { color: rgba(0,0,0,0.25); }

    .ext {
      font-size: 0.85rem;
      color: rgba(0,0,0,0.35);
    }

    .square-toggle {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      user-select: none;
    }
    .square-toggle input { display: none; }
    .square-toggle .toggle-track {
      width: 32px;
      height: 18px;
      border-radius: 9px;
      background: rgba(0,0,0,0.15);
      position: relative;
      transition: background 0.2s;
    }
    .square-toggle input:checked + .toggle-track {
      background: #333;
    }
    .square-toggle .toggle-track::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      transition: transform 0.2s;
    }
    .square-toggle input:checked + .toggle-track::after {
      transform: translateX(14px);
    }
    .square-toggle span {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.35);
    }

    button.save-btn {
      padding: 0.5rem 1.5rem;
      font-family: inherit;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #fff;
      background: #333;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    button.save-btn:hover { background: #555; }
    button.save-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .status {
      font-size: 0.8rem;
      color: rgba(0,0,0,0.4);
      min-height: 1.2em;
    }
    .status.error { color: #c44; }
    .status.success { color: #3a3; }

    /* Auth overlay */
    .auth-overlay {
      position: fixed;
      inset: 0;
      background: #fff;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }

    .auth-overlay h2 {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.35);
    }

    .auth-overlay button {
      padding: 0.75rem 2.5rem;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #fff;
      background: #333;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
    }
    .auth-overlay button:hover { background: #555; }

    /* Side-by-side layout */
    .workspace {
      display: flex;
      gap: 2rem;
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .crop-container {
      flex: 1;
      min-width: 0;
      max-width: 550px;
    }

    .crop-container img {
      display: block;
      max-width: 100%;
    }

    .preview-section {
      flex-shrink: 0;
    }

    .preview-section h3 {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.35);
      margin-bottom: 1rem;
    }

    .preview-info {
      font-size: 0.75rem;
      color: rgba(0,0,0,0.3);
      margin-top: 0.5rem;
    }

    .preview-canvas {
      background: #f2f2f2;
      border: 1px solid rgba(0,0,0,0.08);
      max-width: 400px;
      height: auto;
    }

    .empty-state {
      max-width: 1000px;
      margin: 8rem auto;
      text-align: center;
      color: rgba(0,0,0,0.3);
      font-size: 0.9rem;
      letter-spacing: 0.1em;
    }

    @media (max-width: 768px) {
      .workspace {
        flex-direction: column;
      }
      .crop-container {
        max-width: 100%;
      }
    }

    /* Cropper.js overrides for light theme */
    .cropper-modal { background: rgba(0,0,0,0.5); }
    .cropper-view-box { outline: 1px solid rgba(0,0,0,0.6); }
    .cropper-line { background-color: rgba(0,0,0,0.3); }
    .cropper-point { background-color: #333; }
    .cropper-dashed { border-color: rgba(0,0,0,0.3); }
  </style>
</head>
<body>

  <!-- Auth overlay (production only) -->
  <div id="auth-overlay" class="auth-overlay" style="display:none;">
    <h2>Sign in to use this tool</h2>
    <button id="auth-btn">Sign in with GitHub</button>
  </div>

  <div class="toolbar">
    <h1>Crop Tool</h1>
    <a href="/admin/">Back to Admin</a>
    <label class="file-label">
      Choose Image
      <input type="file" id="file-input" accept="image/*">
    </label>
    <label class="square-toggle">
      <input type="checkbox" id="square-lock">
      <div class="toggle-track"></div>
      <span>1:1 Square</span>
    </label>
    <div class="name-group">
      <label for="file-name">Name</label>
      <input type="text" id="file-name" class="name-input" placeholder="my-image-name">
      <span class="ext">.png</span>
    </div>
    <button class="save-btn" id="save-btn" disabled>Save to Uploads</button>
    <span class="status" id="status"></span>
  </div>

  <div id="empty-state" class="empty-state">
    Choose an image to begin. Images are cropped to 1000px tall, up to 1000px wide. Enable 1:1 Square for 1000 x 1000 output.
  </div>

  <div class="workspace" style="display:none;" id="workspace">
    <div class="crop-container" id="crop-container">
      <img id="crop-image" src="" alt="Crop source">
    </div>

    <div class="preview-section" id="preview-section">
      <h3>Preview</h3>
      <canvas id="preview-canvas" class="preview-canvas" width="800" height="600"></canvas>
      <p class="preview-info" id="preview-info">800 x 600</p>
    </div>
  </div>

  <script src="https://unpkg.com/cropperjs@1.6.2/dist/cropper.min.js"></script>
  <script>
    (() => {
      const MAX_WIDTH = 1000;
      const OUTPUT_HEIGHT = 1000;
      const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

      // DOM refs
      const authOverlay = document.getElementById('auth-overlay');
      const authBtn = document.getElementById('auth-btn');
      const fileInput = document.getElementById('file-input');
      const fileName = document.getElementById('file-name');
      const saveBtn = document.getElementById('save-btn');
      const statusEl = document.getElementById('status');
      const emptyState = document.getElementById('empty-state');
      const workspace = document.getElementById('workspace');
      const cropContainer = document.getElementById('crop-container');
      const cropImage = document.getElementById('crop-image');
      const previewCanvas = document.getElementById('preview-canvas');
      const previewInfo = document.getElementById('preview-info');

      const squareLock = document.getElementById('square-lock');

      let cropper = null;
      let ghToken = null;

      // ---- Auth ----

      function getStoredToken() {
        return sessionStorage.getItem('gh_token') || localStorage.getItem('gh_token');
      }

      function storeToken(token) {
        sessionStorage.setItem('gh_token', token);
      }

      function initAuth() {
        if (isLocal) {
          ghToken = null;
          return;
        }

        // Check stored token
        const stored = getStoredToken();
        if (stored) {
          ghToken = stored;
          return;
        }

        // Need to authenticate — open popup using existing CMS OAuth flow
        authOverlay.style.display = '';
        authBtn.addEventListener('click', () => {
          const popup = window.open('/api/auth', 'github-auth', 'width=600,height=700');

          window.addEventListener('message', function onMessage(e) {
            // The CMS callback sends: "authorizing:github" then "authorization:github:success:{token json}"
            if (typeof e.data !== 'string') return;

            if (e.data.startsWith('authorization:github:success:')) {
              const payload = JSON.parse(e.data.replace('authorization:github:success:', ''));
              ghToken = payload.token;
              storeToken(ghToken);
              authOverlay.style.display = 'none';
              window.removeEventListener('message', onMessage);
              if (popup) popup.close();
            }
          });

          // The callback page expects this message to trigger the token postMessage
          const interval = setInterval(() => {
            if (popup && !popup.closed) {
              popup.postMessage('authorizing:github', '*');
            } else {
              clearInterval(interval);
            }
          }, 250);
        });
      }

      initAuth();

      // ---- Cropper ----

      function getCropperOptions() {
        const opts = {
          viewMode: 1,
          dragMode: 'move',
          autoCropArea: 1,
          restore: false,
          guides: true,
          center: true,
          highlight: false,
          cropBoxMovable: true,
          cropBoxResizable: true,
          toggleDragModeOnDblclick: false,
          ready: updatePreview,
          crop: updatePreview,
        };
        if (squareLock.checked) opts.aspectRatio = 1;
        return opts;
      }

      function rebuildCropper() {
        if (!cropper) return;
        const src = cropImage.src;
        cropper.destroy();
        cropper = new Cropper(cropImage, getCropperOptions());
      }

      squareLock.addEventListener('change', rebuildCropper);

      fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Auto-fill name from filename
        const baseName = file.name.replace(/\.[^.]+$/, '')
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, '-')
          .replace(/^-|-$/g, '');
        fileName.value = baseName;

        const reader = new FileReader();
        reader.onload = (ev) => {
          emptyState.style.display = 'none';
          workspace.style.display = '';

          // Destroy previous cropper
          if (cropper) cropper.destroy();

          cropImage.src = ev.target.result;
          cropper = new Cropper(cropImage, getCropperOptions());

          saveBtn.disabled = false;
          setStatus('');
        };
        reader.readAsDataURL(file);
      });

      function getOutputDimensions() {
        if (squareLock.checked) return { width: 1000, height: 1000 };
        if (!cropper) return { width: MAX_WIDTH, height: OUTPUT_HEIGHT };
        const data = cropper.getCropBoxData();
        const imageData = cropper.getImageData();
        // Get the actual crop aspect ratio
        const cropData = cropper.getData(true);
        const aspect = cropData.width / cropData.height;
        // Height is always 600, width scales with aspect ratio, max 800
        const width = Math.min(Math.round(OUTPUT_HEIGHT * aspect), MAX_WIDTH);
        return { width: width, height: OUTPUT_HEIGHT };
      }

      function updatePreview() {
        if (!cropper) return;
        const dims = getOutputDimensions();
        const canvas = cropper.getCroppedCanvas({
          width: dims.width,
          height: dims.height,
          imageSmoothingEnabled: true,
          imageSmoothingQuality: 'high',
        });
        if (!canvas) return;

        previewCanvas.width = dims.width;
        previewCanvas.height = dims.height;
        const ctx = previewCanvas.getContext('2d');
        ctx.clearRect(0, 0, dims.width, dims.height);
        ctx.drawImage(canvas, 0, 0);
        previewInfo.textContent = dims.width + ' x ' + dims.height;
      }

      // ---- Save ----

      function setStatus(msg, type) {
        statusEl.textContent = msg;
        statusEl.className = 'status' + (type ? ' ' + type : '');
      }

      function sanitizeName(name) {
        return name.trim()
          .toLowerCase()
          .replace(/[^a-z0-9\-_]/g, '-')
          .replace(/-+/g, '-')
          .replace(/^-|-$/g, '') || 'image';
      }

      saveBtn.addEventListener('click', async () => {
        if (!cropper) return;

        const name = sanitizeName(fileName.value);
        if (!name) {
          setStatus('Please enter a file name.', 'error');
          return;
        }

        const fullName = name + '.png';

        saveBtn.disabled = true;
        setStatus('Processing...');

        // Get cropped canvas at output dimensions
        const dims = getOutputDimensions();
        const canvas = cropper.getCroppedCanvas({
          width: dims.width,
          height: dims.height,
          imageSmoothingEnabled: true,
          imageSmoothingQuality: 'high',
        });

        canvas.toBlob(async (blob) => {
          try {
            if (isLocal) {
              await saveLocal(blob, fullName);
              setStatus('Downloaded ' + fullName + ' — save it to the uploads/ folder', 'success');
            } else {
              await saveProduction(blob, fullName);
              setStatus('Saved as /uploads/' + fullName, 'success');
            }
          } catch (err) {
            setStatus('Error: ' + err.message, 'error');
          }
          saveBtn.disabled = false;
        }, 'image/png');
      });

      // ---- Save: Local (download to uploads/ folder) ----

      async function saveLocal(blob, filename) {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        // File downloads — user saves it into the uploads/ folder
      }

      // ---- Save: Production (GitHub API via serverless function) ----

      async function saveProduction(blob, filename) {
        // Convert blob to base64
        const buffer = await blob.arrayBuffer();
        const bytes = new Uint8Array(buffer);
        let binary = '';
        for (let i = 0; i < bytes.length; i++) {
          binary += String.fromCharCode(bytes[i]);
        }
        const base64 = btoa(binary);

        const res = await fetch('/api/upload', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + ghToken,
          },
          body: JSON.stringify({
            filename: filename,
            content: base64,
          }),
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || 'Upload failed');
        }
      }

    })();
  </script>
</body>
</html>
