<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Florez Florez</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- HOMEPAGE: Panels -->
  <div id="home" class="home">
    <img src="images/logo.png" alt="Florez Florez" class="home-logo">
    <div class="panel" data-section="art">
      <div class="panel-bg" id="panel-bg-art"></div>
      <div class="panel-overlay"></div>
      <span class="panel-label">ART</span>
    </div>
    <div class="panel" data-section="necklaces">
      <div class="panel-bg" id="panel-bg-necklaces"></div>
      <div class="panel-overlay"></div>
      <span class="panel-label">NECKLACES</span>
    </div>
    <div class="panel" data-section="rings">
      <div class="panel-bg" id="panel-bg-rings"></div>
      <div class="panel-overlay"></div>
      <span class="panel-label">RINGS</span>
    </div>
    <div class="panel" data-section="consulting">
      <div class="panel-bg" id="panel-bg-consulting"></div>
      <div class="panel-overlay"></div>
      <span class="panel-label">CONSULTING</span>
    </div>
  </div>

  <!-- TOP HEADER NAV (visible when a section is open) -->
  <header id="header" class="header">
    <nav class="header-nav">
      <a href="#" class="header-link" data-section="art">ART</a>
      <a href="#" class="header-link" data-section="necklaces">NECKLACES</a>
      <a href="#" class="header-link" data-section="rings">RINGS</a>
      <a href="#" class="header-link" data-section="consulting">CONSULTING</a>
    </nav>
    <img src="images/logo.png" alt="Florez Florez" class="header-logo">
  </header>

  <!-- SECTION: ART (populated by JS) -->
  <section id="section-art" class="section">
    <div class="art-layout">
      <aside class="art-sidebar">
        <ul class="art-nav" id="art-nav"></ul>
      </aside>
      <main class="art-content" id="art-content"></main>
    </div>
  </section>

  <!-- SECTION: NECKLACES (populated by JS) -->
  <section id="section-necklaces" class="section">
    <div class="art-layout">
      <aside class="art-sidebar">
        <ul class="art-nav" id="necklaces-nav"></ul>
      </aside>
      <main class="art-content" id="necklaces-content"></main>
    </div>
  </section>

  <!-- SECTION: RINGS (populated by JS) -->
  <section id="section-rings" class="section">
    <div class="art-layout">
      <aside class="art-sidebar">
        <ul class="art-nav" id="rings-nav"></ul>
      </aside>
      <main class="art-content" id="rings-content"></main>
    </div>
  </section>

  <!-- SECTION: CONSULTING (populated by JS) -->
  <section id="section-consulting" class="section section-consulting">
    <div class="consulting-inner" id="consulting-inner">
      <div class="consulting-bg" id="consulting-bg"></div>
      <div class="consulting-overlay"></div>
      <div class="consulting-text" id="consulting-text"></div>
    </div>
  </section>

  <!-- FULLSCREEN LIGHTBOX -->
  <div id="lightbox" class="lightbox">
    <button class="lightbox-close" aria-label="Close">&times;</button>
    <button class="lightbox-prev" aria-label="Previous">&#8249;</button>
    <button class="lightbox-next" aria-label="Next">&#8250;</button>
    <img class="lightbox-img" src="" alt="">
    <div class="lightbox-counter"></div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
